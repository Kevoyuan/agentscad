<svg xmlns="http://www.w3.org/2000/svg" width="1680" height="940" viewBox="0 0 1680 940" role="img" aria-labelledby="title desc">
  <title id="title">AgentSCAD AI-native CAD agent system architecture</title>
  <desc id="desc">Five-stage AgentSCAD architecture showing input and job context, agent core, deterministic CAD pipeline, delivery and human review, and memory with continuous improvement.</desc>
  <defs>
    <style>
      .bg { fill: #fbfaf7; }
      .title { fill: #080d1d; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 64px; font-weight: 800; }
      .subtitle { fill: #3f4657; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 26px; font-style: italic; }
      .panel { fill: #fffefb; stroke: #1e5ad7; stroke-width: 1.5; }
      .panel-orange { fill: #fffefb; stroke: #ff5a16; stroke-width: 1.5; }
      .panel-purple { fill: #fffefb; stroke: #4b20a8; stroke-width: 1.5; }
      .card { fill: #fffefb; stroke: #c6d4f8; stroke-width: 1.4; }
      .card-orange { fill: #fffefb; stroke: #ffb28a; stroke-width: 1.4; }
      .card-green { fill: #f8fff8; stroke: #27a844; stroke-width: 1.4; }
      .card-purple { fill: #fffefb; stroke: #d0bff2; stroke-width: 1.4; }
      .blue { fill: #0646c8; }
      .orange { fill: #f25511; }
      .purple { fill: #3f159f; }
      .green { fill: #148b32; }
      .heading { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 24px; font-weight: 750; }
      .label { fill: #111827; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 17px; font-weight: 600; }
      .text { fill: #151923; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 16px; }
      .small { fill: #222733; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 13px; }
      .tiny { fill: #273244; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 12px; }
      .icon { fill: none; stroke: #0646c8; stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; }
      .icon-orange { fill: none; stroke: #f25511; stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; }
      .icon-purple { fill: none; stroke: #3f159f; stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; }
      .icon-green { fill: none; stroke: #148b32; stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; }
      .arrow { stroke: #0f172a; stroke-width: 4; fill: none; marker-end: url(#arrow); }
      .arrow-orange { stroke: #ff5a16; stroke-width: 4; fill: none; marker-end: url(#arrowOrange); }
      .memory-line { stroke: #3f159f; stroke-width: 3; fill: none; stroke-dasharray: 9 9; marker-end: url(#arrowPurple); }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10z" fill="#0f172a"/>
    </marker>
    <marker id="arrowOrange" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10z" fill="#ff5a16"/>
    </marker>
    <marker id="arrowPurple" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10z" fill="#3f159f"/>
    </marker>
  </defs>

  <rect class="bg" width="1680" height="940"/>
  <text x="840" y="70" text-anchor="middle" class="title">AgentSCAD: AI-Native CAD Agent System</text>
  <text x="840" y="120" text-anchor="middle" class="subtitle">Natural-language to OpenSCAD generation, rendering, validation, and iterative repair</text>

  <rect x="25" y="152" width="250" height="570" rx="12" class="panel"/>
  <circle cx="70" cy="186" r="18" class="blue"/><text x="70" y="194" text-anchor="middle" fill="white" class="heading">1</text>
  <text x="125" y="193" class="heading blue">Input &amp;</text>
  <text x="105" y="219" class="heading blue">Job Context</text>

  <rect x="38" y="245" width="224" height="110" rx="9" class="card"/>
  <circle cx="86" cy="280" r="16" class="icon"/><path d="M58 328c5-27 51-27 56 0M86 296v0" class="icon"/>
  <text x="150" y="293" class="text">User /</text><text x="150" y="318" class="text">Operator</text>
  <rect x="38" y="375" width="224" height="118" rx="9" class="card"/>
  <path d="M55 405h55v42H75l-20 17zM68 422h30M68 437h22" class="icon"/>
  <text x="135" y="423" class="text">Natural-language</text><text x="135" y="449" class="text">request</text>
  <rect x="38" y="510" width="224" height="192" rx="9" class="card"/>
  <path d="M65 540h42v62H65zM76 540v-10h20v10M75 558h20M75 578h20M75 596h20" class="icon"/>
  <text x="125" y="555" class="text">Job Context</text>
  <text x="125" y="585" class="small">- Part family</text>
  <text x="125" y="612" class="small">- Parameters</text>
  <text x="125" y="639" class="small">- Customer constraints</text>

  <rect x="302" y="152" width="358" height="570" rx="12" class="panel"/>
  <circle cx="402" cy="186" r="18" class="blue"/><text x="402" y="194" text-anchor="middle" fill="white" class="heading">2</text>
  <text x="440" y="195" class="heading blue">Agent Core</text>
  <rect x="323" y="225" width="128" height="162" rx="9" class="card"/>
  <path d="M350 265l37-21 37 21v45l-37 22-37-22zM350 265l37 22 37-22M387 287v45M368 255v45M406 255v45" class="icon"/>
  <text x="387" y="342" text-anchor="middle" class="text">CAD</text><text x="387" y="365" text-anchor="middle" class="small">Generation Agent</text>
  <text x="485" y="298" text-anchor="middle" font-size="44" fill="#0f172a">↔</text>
  <rect x="515" y="225" width="126" height="162" rx="9" class="card"/>
  <path d="M554 305l58-58M584 248l18-7-7 18M540 333h74v-48h-74zM566 318l-13-10 13-10M589 298l13 10-13 10" class="icon"/>
  <text x="578" y="342" text-anchor="middle" class="text">SCAD</text><text x="578" y="365" text-anchor="middle" class="small">Repair Agent</text>
  <rect x="313" y="402" width="336" height="144" rx="9" class="card"/>
  <text x="481" y="427" text-anchor="middle" class="heading blue">Harness</text>
  <rect x="323" y="437" width="66" height="102" rx="8" class="card"/>
  <circle cx="356" cy="469" r="17" class="icon"/><path d="M350 459l16 10-16 10z" class="icon"/>
  <text x="356" y="506" text-anchor="middle" class="tiny">Skill</text><text x="356" y="525" text-anchor="middle" class="tiny">Runner</text>
  <rect x="398" y="437" width="76" height="102" rx="8" class="card"/>
  <path d="M420 488l31-31M420 488h-13M451 457v-13M437 471h-13M437 471v13" class="icon"/>
  <text x="436" y="506" text-anchor="middle" class="tiny">Model</text><text x="436" y="525" text-anchor="middle" class="tiny">Router</text>
  <rect x="482" y="437" width="76" height="102" rx="8" class="card"/>
  <text x="520" y="484" text-anchor="middle" class="heading blue">{ }</text>
  <text x="520" y="506" text-anchor="middle" class="tiny">Structured</text><text x="520" y="525" text-anchor="middle" class="tiny">Output</text>
  <rect x="568" y="437" width="76" height="102" rx="8" class="card"/>
  <path d="M606 453v20M606 502v20M586 473h20M606 473h20M586 502h20M606 502h20" class="icon"/>
  <text x="606" y="506" text-anchor="middle" class="tiny">Skill</text><text x="606" y="525" text-anchor="middle" class="tiny">Resolver</text>
  <rect x="313" y="555" width="336" height="147" rx="9" class="card"/>
  <text x="481" y="583" text-anchor="middle" class="heading blue">Skill Library</text>
  <path d="M350 600h32l16 16v48h-48zM382 600v16h16M363 633h22M363 650h22" class="icon"/>
  <text x="374" y="668" text-anchor="middle" class="small">CAD</text><text x="374" y="690" text-anchor="middle" class="small">Prompts</text>
  <path d="M470 622h25v20h-25zM442 650h25v20h-25zM498 650h25v20h-25zM483 642v8M455 642h56" class="icon"/>
  <text x="483" y="668" text-anchor="middle" class="small">Family</text><text x="483" y="690" text-anchor="middle" class="small">Schemas</text>
  <path d="M570 610c18-10 38-10 55 0v55c-17-10-37-10-55 0zM570 610c-18-10-38-10-55 0v55c17-10 37-10 55 0zM570 610v55" class="icon"/>
  <text x="570" y="668" text-anchor="middle" class="small">OpenSCAD</text><text x="570" y="690" text-anchor="middle" class="small">Guidance</text>

  <rect x="688" y="152" width="288" height="570" rx="12" class="panel"/>
  <circle cx="735" cy="186" r="18" class="blue"/><text x="735" y="194" text-anchor="middle" fill="white" class="heading">3</text>
  <text x="788" y="194" class="heading blue">Deterministic</text>
  <text x="788" y="220" class="heading blue">CAD Pipeline</text>
  <path d="M725 244h31l25 25v57h-56zM756 244v25h25" class="icon"/>
  <text x="753" y="291" text-anchor="middle" class="tiny blue">.scad</text>
  <text x="805" y="269" class="text">OpenSCAD</text><text x="805" y="294" class="text">Source Generation</text>
  <path d="M752 334v40" class="arrow"/>
  <path d="M725 390l28-16 28 16v34l-28 17-28-17zM725 390l28 17 28-17M753 407v34" class="icon"/>
  <text x="805" y="392" class="text">Render to STL</text><text x="805" y="417" class="text">&amp; Preview</text>
  <path d="M752 450v40" class="arrow"/>
  <path d="M718 530l68-68M730 542l-12-12 19-19 12 12zM776 474l16-7-7 16" class="icon"/>
  <text x="805" y="491" class="text">Validation</text>
  <rect x="805" y="505" width="140" height="30" rx="6" class="card"/><text x="875" y="525" text-anchor="middle" class="small blue">Mesh Validation</text>
  <rect x="805" y="543" width="140" height="30" rx="6" class="card"/><text x="875" y="563" text-anchor="middle" class="small blue">Visual Validation</text>
  <path d="M752 585v45" class="arrow"/>
  <ellipse cx="752" cy="649" rx="30" ry="13" class="icon"/><path d="M722 649v45c0 7 60 7 60 0v-45" class="icon"/><path d="M722 672c0 7 60 7 60 0" class="icon"/>
  <text x="805" y="654" class="text">Artifact Storage</text><text x="805" y="680" class="small">(Models, Previews, Logs)</text>

  <rect x="1006" y="152" width="320" height="570" rx="12" class="panel-orange"/>
  <circle cx="1088" cy="186" r="18" class="orange"/><text x="1088" y="194" text-anchor="middle" fill="white" class="heading">4</text>
  <text x="1135" y="194" class="heading orange">Delivery &amp;</text>
  <text x="1120" y="220" class="heading orange">Human Review</text>
  <rect x="1020" y="236" width="138" height="181" rx="9" class="card-green"/>
  <circle cx="1089" cy="277" r="26" class="icon-green"/><path d="M1075 277l11 12 22-26" class="icon-green"/>
  <text x="1089" y="341" text-anchor="middle" class="label green">Delivered</text>
  <text x="1089" y="376" text-anchor="middle" class="small">Meets requirements</text><text x="1089" y="396" text-anchor="middle" class="small">and validated</text>
  <rect x="1170" y="236" width="144" height="181" rx="9" class="card-orange"/>
  <circle cx="1242" cy="262" r="14" class="icon-orange"/><path d="M1223 296c4-25 34-25 38 0z" class="icon-orange"/>
  <text x="1242" y="331" text-anchor="middle" class="label orange">Human</text><text x="1242" y="355" text-anchor="middle" class="label orange">Review</text>
  <text x="1242" y="383" text-anchor="middle" class="small">Requires changes</text><text x="1242" y="402" text-anchor="middle" class="small">or clarification</text>
  <path d="M1242 418c0 32-28 24-78 24-55 0-78 0-78 31" class="arrow-orange" stroke-dasharray="9 9"/>
  <rect x="1018" y="455" width="294" height="160" rx="9" class="card-orange"/>
  <text x="1165" y="485" text-anchor="middle" class="heading orange">Human Edits</text>
  <rect x="1030" y="498" width="84" height="103" rx="8" class="card-orange"/>
  <path d="M1054 521h35M1054 542h35M1054 563h35M1064 514v14M1080 535v14M1068 556v14" class="icon-orange"/>
  <text x="1072" y="575" text-anchor="middle" class="tiny">Parameter</text><text x="1072" y="592" text-anchor="middle" class="tiny">Edits</text>
  <rect x="1122" y="498" width="86" height="103" rx="8" class="card-orange"/>
  <text x="1165" y="546" text-anchor="middle" class="heading orange">&lt;/&gt;</text>
  <text x="1165" y="575" text-anchor="middle" class="tiny">SCAD</text><text x="1165" y="592" text-anchor="middle" class="tiny">Edits</text>
  <rect x="1218" y="498" width="84" height="103" rx="8" class="card-orange"/>
  <path d="M1238 519h42v38h-15l-15 14v-14h-12zM1248 533h22M1248 545h18" class="icon-orange"/>
  <text x="1260" y="575" text-anchor="middle" class="tiny">Notes &amp;</text><text x="1260" y="592" text-anchor="middle" class="tiny">Feedback</text>
  <path d="M1072 610v27M1165 610v27M1260 610v27" class="arrow-orange"/>
  <rect x="1018" y="634" width="294" height="72" rx="9" class="card-orange"/>
  <path d="M1050 684a24 24 0 1 1 12 12M1051 697h-16v-16" class="icon-orange"/>
  <text x="1112" y="666" class="heading orange">Apply &amp; Re-render</text>
  <text x="1115" y="692" class="small">Iterate until accepted</text>

  <rect x="1354" y="152" width="294" height="570" rx="12" class="panel-purple"/>
  <circle cx="1417" cy="186" r="18" class="purple"/><text x="1417" y="194" text-anchor="middle" fill="white" class="heading">5</text>
  <text x="1462" y="194" class="heading purple">Memory &amp;</text>
  <text x="1452" y="220" class="heading purple">Continuous Improvement</text>
  <rect x="1366" y="245" width="270" height="110" rx="9" class="card-purple"/>
  <path d="M1405 304c-21-3-22-35 0-39 4-24 34-18 32 5 23-4 31 27 10 37 1 24-34 25-35 1-10 8-28 4-32-10" class="icon-purple"/>
  <text x="1454" y="283" class="label purple">Working Memory</text>
  <text x="1454" y="312" class="small">Current job state, parameters,</text><text x="1454" y="333" class="small">context, validation results</text>
  <rect x="1366" y="375" width="270" height="110" rx="9" class="card-purple"/>
  <path d="M1402 405a31 31 0 1 1-18 56M1382 423v-21M1382 423h-20M1405 418v28l18 10" class="icon-purple"/>
  <text x="1454" y="413" class="label purple">Edit History</text>
  <text x="1454" y="443" class="small">User edits, notes,</text><text x="1454" y="464" class="small">version timeline</text>
  <rect x="1366" y="510" width="270" height="110" rx="9" class="card-purple"/>
  <path d="M1386 545l28-16 28 16v34l-28 17-28-17zM1386 545l28 17 28-17M1414 562v34" class="icon-purple"/>
  <text x="1454" y="548" class="label purple">Artifact Memory</text>
  <text x="1454" y="578" class="small">Generated assets, logs,</text><text x="1454" y="599" class="small">previews, validations</text>
  <rect x="1366" y="635" width="270" height="75" rx="9" class="card-purple"/>
  <path d="M1389 690v-28M1408 690v-44M1427 690v-62M1384 648l18-18 17 14 25-32" class="icon-purple"/>
  <text x="1454" y="661" class="label purple">Learned Patterns</text>
  <text x="1454" y="688" class="small">Improved prompts, validations,</text><text x="1454" y="707" class="small">family insights</text>

  <path d="M275 342h24" class="arrow"/>
  <path d="M660 342h24" class="arrow"/>
  <path d="M976 342h26" class="arrow"/>
  <path d="M1326 342h24" class="arrow"/>
  <path d="M1165 706v34c0 0-1 2-3 4-15 17-330 17-336 0-2-5-2-12-2-12v-80" class="arrow-orange"/>
  <path d="M1498 722v52c0 0 0 0-1 1H459c0 0-1 0-1-1v-44" class="memory-line"/>
  <text x="936" y="810" text-anchor="middle" class="heading purple">Memory retrieval provides context to agents</text>

  <rect x="282" y="826" width="1110" height="78" rx="10" fill="#fffefb" stroke="#8b6bd6" stroke-width="1.5"/>
  <circle cx="360" cy="854" r="9" class="purple"/><circle cx="385" cy="854" r="9" class="purple"/>
  <path d="M342 884c4-28 40-28 44 0M374 884c4-26 39-26 43 0" fill="#4b20a8"/>
  <text x="434" y="875" class="heading purple">User edits become memory signals for future generations.</text>
  <text x="1048" y="875" class="text">Each iteration makes the system smarter.</text>
</svg>
