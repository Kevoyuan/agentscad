<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CAD Agent</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="header">
        <div class="container">
            <h1 class="logo">CAD Agent</h1>
            <p class="tagline">Transform natural language into 3D models</p>
        </div>
    </header>

    <main class="container">
        <section class="create-section">
            <h2>Create New Job</h2>
            <form id="jobForm" class="job-form">
                <div class="form-group">
                    <label for="requestInput">Describe your CAD request</label>
                    <textarea 
                        id="requestInput" 
                        name="input_request" 
                        rows="3" 
                        placeholder="e.g., A 20mm cube with a 10mm cylindrical hole through the center"
                        required
                    ></textarea>
                </div>
                <button type="submit" class="btn btn-primary">Create Job</button>
            </form>
        </section>

        <section class="jobs-section">
            <h2>Jobs</h2>
            <div class="table-wrapper">
                <table class="jobs-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Request</th>
                            <th>Status</th>
                            <th>Created</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="jobsTableBody">
                        <tr class="loading-row">
                            <td colspan="5">Loading...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>

        <section id="detailSection" class="detail-section hidden">
            <div class="detail-header">
                <h2>Job Details</h2>
                <button id="closeDetail" class="btn btn-close">&times;</button>
            </div>
            <div id="detailContent" class="detail-content">
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
